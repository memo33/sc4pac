info:
  summary: "A DLL plugin that adds modern render-side services for custom DLL mods"
  conflicts: "Only compatible with game version 1.1.641, the Windows digital edition."
  description: |
    SC4RenderServices is a runtime library for SimCity 4 that adds modern render-side services for custom DLL mods. Instead of changing gameplay on its own, it gives plugins a shared foundation for in-game UI, camera access, and rendering hooks. In practical terms, it provides three core systems: an ImGui service for debug tools and custom UI panels, an S3D camera service for world-to-screen and camera helpers, and a draw service for render-pass callbacks and custom drawing in DirectX7. 
    
    You should install it if you want to use newer SC4 DLL plugins that depend on these services, or if you are a mod developer building tools that need a proper in-game interface. SC4RenderServices centralizes the hard parts that every advanced plugin would otherwise have to reinvent, which means better compatibility, less duplicated code, and a more stable base for overlays, visual tools, debug windows, and custom rendering effects. It is essentially a shared dependency layer for a new generation of technical SC4 DLL plugins.

    If a plugin lists SC4RenderServices as a requirement, installing it ensures that plugin can register its windows, access the renderer safely, and behave consistently inside the game.

    This does not enable any specific functionality in game by itself, but will be used in the near future as a dependency for (for example) the Plop and Paint DLL that enables advanced lot plopping and prop painting functionality or for advanced new terrain tool extensions with heightmaps etc. See the link below. 
  warning: |-
    This DLL plugin comes with an INI configuration file:

    * `SC4RenderServices.ini`

    To complete the installation, copy this file from the package subfolder into the root directory of your Plugins folder and edit the file to set your preferences.
    
    This DLL plugin comes with one additional DLL file:

    * `imgui.dll`

    To complete the installation, copy these files from the package subfolder into the Apps folder of your Installation folder.
