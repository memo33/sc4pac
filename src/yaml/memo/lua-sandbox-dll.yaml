info:
  summary: The Lua Sandbox DLL provides a more secure environment for your mods
  conflicts: |-
    Only compatible with game version 1.1.641, the Windows digital edition. Incompatible with: DAMN, BSC Regional Tracking, Cori Reports.
  description: |
    This DLL plugin is designed to enhance your security by preventing mods from accessing potentially dangerous Lua functions.
    It blocks unsafe operations such as reading and writing files, executing shell commands, and other actions that could compromise your system's integrity.
    By restricting these functions, the sandbox helps ensure a safer environment for running untrusted Lua code from any mods you install.

    Lua is a scripting language embedded within the game, commonly used for advisor messages, rewards, and automata generators.
    Although many plugins include Lua scripts, there is generally no need for a plugin to access the file system.
    To ensure security, the sandbox prevents plugins from performing such operations.

    The Lua Sandbox DLL is compatible with nearly all plugins, so it is advisable to keep it always installed.
    You can monitor the DLL's .log file to see whether any plugin attempted to call a restricted Lua function.

    This DLL is provided on a best-effort basis, without guarantees it can prevent every potential exploit.
