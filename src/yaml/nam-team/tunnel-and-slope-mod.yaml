info:
  summary: "Network Addon Mod Tunnel and Slope Mod"
  description: |
    This package provides players with additional choices for the slope
    parameters of surface transportation networks in the game.
    This collection of slope mods was designed by Lucario Boricua, author of
    the [Earthworks Tutorials](https://community.simtropolis.com/forums/topic/759928-lucario-boricuas-earthworks-tutorials-official-thread/) series. Extensive research was conducted for both
    other slope mods and the findings of previous precision terraforming pioneers,
    most notably BigRedFish and Ennedi, as well as geometric design
    characteristics of real transportation networks, to best harmonize playability
    and realism.
  author: "Lucario Boricua"
  website: "https://community.simtropolis.com/files/file/35420-network-addon-mod-tunnel-and-slope-mod/"
  images:
    - https://www.simtropolis.com/objects/screens/monthly_2023_01/63c4a9482c3dd_NAMTunnelandSlopeMod-01VeryEasy-VerySteep.jpg.09ef905e5748d4429f1e99dce455d32d.jpg
    - https://www.simtropolis.com/objects/screens/monthly_2023_01/63c4a94f04fad_NAMTunnelandSlopeMod-02Easy-Steep.jpg.5b7d93c7c92939c4501fb476df661f7b.jpg
    - https://www.simtropolis.com/objects/screens/monthly_2023_01/63c4a9562eea3_NAMTunnelandSlopeMod-03Moderate-Vanilla.jpg.3a8a14438a79639aaf2d3a6a322f602c.jpg
    - https://www.simtropolis.com/objects/screens/monthly_2023_01/63c4a95b44c57_NAMTunnelandSlopeMod-03Moderate-NAMStyle.jpg.b6072d40249c1f0beef6e97fc9a5261b.jpg
    - https://www.simtropolis.com/objects/screens/monthly_2023_01/63c4a95fe4cc2_NAMTunnelandSlopeMod-04Strict-Flat.jpg.2a3f15e464be20f1c58f23d259fa439d.jpg
    - https://www.simtropolis.com/objects/screens/monthly_2023_01/63c4a96868fad_NAMTunnelandSlopeMod-05Realistic-VeryFlat.jpg.9063726ead3170f099ad6f22bee3ffee.jpg

variantInfo:
- variantId: nam-team:tunnel-and-slope-mod:difficulty
  description: Choose the relative steepness for all networks.
  values:
  - value: maxis
    description: No change to the maximum slopes, retaining the Maxis default parameters. Recommended for players who prefer a vanilla experience.
  - value: very-easy
    description: A minimal reduction in the maximum slopes with some smoothness added. Recommended for players who do not want transportation networks to interfere with gameplay, but still want a visual improvement of their transportation networks.
  - value: easy
    description: A small reduction in the maximum slopes with more smoothness added. Recommended for players who regularly play on rugged topography and want to minimize precision terraforming.
  - value: moderate-vanilla
    description: An intermediate reduction of the maximum slopes with a clear smoothing of the networks. Recommended for players who have experience with slope mods, unless they are using it on existing cities built over rugged terrain and numerous parallel networks.
  - value: moderate-nam
    description: An intermediate reduction of the maximum slopes with a clear smoothing of the networks. Additionally features vertical curvature when transitioning between sloped and flat segments. Recommended for players who have experience with slope mods, unless they are using it on existing cities built over rugged terrain and numerous parallel networks.
    default: true
  - value: strict
    description: A large reduction of the maximum slopes, with clear smoothing and vertical curvature. Recommended for players who want highly realistic network designs and greater challenge in building across rugged terrain, with flatter networks forcing them to choose alignments more carefully.
  - value: realistic
    description: NOT RECOMMENDED FOR MOST PLAYERS. A very large reduction of the maximum slopes, with values nearly identical to those found in real transportation network design. Transportation power players and players accustomed to precision terraforming will likely find these settings challenging.

